[workspace]
authors = ["Richard Osterloh <richard.osterloh@gmail.com>"]
channels = ["robostack-kilted", "conda-forge"]
name = "RaspRover"
platforms = ["linux-64", "linux-aarch64"]
version = "0.1.0"

# ── ROS 2 ─────────────────────────────────────────────────────────────────────
# Activation script only exists after `pixi run -e ros build` has run once.
[feature.ros.activation]
scripts = ["robot/install/setup.sh"]

[feature.ros.activation.env]
DBUS_SYSTEM_BUS_ADDRESS = "unix:path=/var/run/dbus/system_bus_socket"

[feature.ros.dependencies]
ros-kilted-desktop = ">=0.12.0,<0.13"
ros-kilted-ros-gz = ">=2.1.9,<3"
ros-kilted-xacro = "*"
ros-kilted-joint-state-publisher = ">=2.4.0,<3"
ros-kilted-joint-state-publisher-gui = ">=2.4.0,<3"
ros-kilted-gz-ros2-control = ">=2.0.9,<3"
ros-kilted-ros2-control = ">=5.2.0,<6"
ros-kilted-ros2-controllers = ">=5.2.0,<6"
ros-kilted-controller-manager = ">=5.2.0,<6"
ros-kilted-gz-ros2-control-demos = ">=2.0.9,<3"
ros-kilted-cv-bridge = ">=4.1.0,<5"
ros-kilted-image-transport = ">=6.1.2,<7"
ros-kilted-v4l2-camera = ">=0.7.1,<0.8"
python = ">=3.12.12,<3.13"
compilers = ">=1.11.0,<2"
ffmpeg = "<8"
colcon-common-extensions = ">=0.3.0,<0.4"
rust = ">=1.95.0,<1.96"
rust-src = ">=1.95.0,<2"
cmake = ">=4.2.2,<5"
ninja = ">=1.13.2,<2"
pkg-config = ">=0.29.2,<0.30"
libcurl = ">=8.18.0,<9"
filelock = ">=3.20.3,<4"
setuptools = ">=80.9.0,<81"

[feature.ros.pypi-dependencies]
colcon-cargo = { git = "https://github.com/colcon/colcon-cargo.git" }
colcon-ros-cargo = { git = "https://github.com/colcon/colcon-ros-cargo.git" }

[feature.ros.tasks]
build = { cmd = "colcon build --symlink-install", cwd = "robot" }
clean = { cmd = "rm -rf build/ install/ log/ .cargo/", cwd = "robot" }
start = { cmd = "ros2 launch rasprover_bringup bringup.launch.py sim_mode:=false", cwd = "robot" }
simulation = { cmd = "ros2 launch rasprover_bringup bringup.launch.py sim_mode:=true", cwd = "robot" }
gazebo = { cmd = "ros2 launch rasprover_gz gz_bringup.launch.py sim_mode:=true", cwd = "robot" }
rviz = { cmd = "rviz2 -d src/rasprover_rviz/config/rasprover_realtime.rviz", cwd = "robot" }

# ── Firmware ──────────────────────────────────────────────────────────────────
# The esp Xtensa toolchain is not in conda; run `setup-toolchain` once after
# pixi install, then use the other tasks normally.
[feature.firmware.activation]
scripts = ["firmware/esp-activate.sh"]

[feature.firmware.activation.env]
RUSTUP_TOOLCHAIN = "esp"

[feature.firmware.dependencies]
cmake = ">=4.2.2,<5"
ninja = ">=1.13.2,<2"
pkg-config = ">=0.29.2,<0.30"
python = ">=3.12.12,<3.13"

[feature.firmware.tasks]
setup-toolchain = "cargo install espup && espup install && cargo install espflash probe-rs-tools"
build = { cmd = "cargo build --release", cwd = "firmware" }
flash = { cmd = "cargo run --release", cwd = "firmware" }
monitor = { cmd = "espflash monitor", cwd = "firmware" }
firmware-image = { cmd = "make firmware", cwd = "firmware" }
erase = { cmd = "espflash erase-flash", cwd = "firmware" }
stats = { cmd = "make stats", cwd = "firmware" }

# ── Environments ──────────────────────────────────────────────────────────────
[environments]
ros = { features = ["ros"], no-default-feature = true }
firmware = { features = ["firmware"], no-default-feature = true }
